<!DOCTYPE html>
<html lang="en">
<head><title>Download Logo</title></head>
<body style="background: #0d0f14; color: #4af0a0; font-family: monospace; padding: 40px;">
  <h2>Generating Logo...</h2>
  <canvas id="canvas" width="120" height="120" style="display:none;"></canvas>
  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="120" height="120">
      <rect x="1" y="1" width="30" height="30" rx="3" fill="#1a1e2b"/>
      <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#2a3050" stroke-width="1.5"/>
      <path fill="none" stroke="#4af0a0" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter" d="M 4 12 h 3 v 8 h -3 z M 4 16 h 3 M 11 12 h 3 v 8 h -3 z M 18 12 h 3 v 8 h -3 z M 18 16 h 3 M 28 12 h -3 v 4 h 3 v 4 h -3"/>
    </svg>`;
    const ctx = document.getElementById('canvas').getContext('2d');
    const img = new Image();
    img.onload = () => { 
      ctx.drawImage(img, 0, 0);
      const a = document.createElement('a');
      a.download = 'sim8085-logo-120.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      document.body.innerHTML = '<h2>✓ Logo generated and downloaded!</h2><p style="color: #c8d4e8;">You can now upload <b>sim8085-logo-120.png</b> to the Google Cloud Console.</p>';
    };
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  </script>
</body>
</html>
